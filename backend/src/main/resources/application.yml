spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/dealership}
    username: ${DB_USER:dealership_user}
    password: ${DB_PASS:dealership_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      # Neon's free tier suspends the compute after idling and wakes on the next connection attempt, which can take a couple seconds.
      # These settings stop Hikari from giving up or handing out dead connections during that wake-up window.
      connection-timeout: 20000
      validation-timeout: 5000
      maximum-pool-size: 5
      minimum-idle: 1
      keepalive-time: 240000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET:dGVtcG9yYXJ5LWRldi1zZWNyZXQtbXVzdC1iZS1jaGFuZ2VkIQ==}
  expiration-ms: ${JWT_EXPIRATION_MS:3600000}

app:
  # Comma-separated list of origins allowed to call this API.
  allowed-origins: ${ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never