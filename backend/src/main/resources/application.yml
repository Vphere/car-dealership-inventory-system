spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/dealership
    username: dealership_user
    password: dealership_pass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:temporary-dev-secret-change-me}
  expiration-ms: 3600000